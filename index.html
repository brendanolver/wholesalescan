<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WNDRR Wholesale Scan</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚚</text></svg>">
<style>
  :root {
    --bg: #f4f4f5;
    --surface: #ffffff;
    --surface2: #e4e4e7;
    --border: #d1d1d6;
    --text: #111;
    --text-dim: #666;
    --accent: #111;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --blue: #3b82f6;
    --radius: 12px;
    --tap: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    overscroll-behavior: none;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-img { height: 28px; width: auto; filter: invert(1); }
  .logo-sub { font-size: 12px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }

  #header-status {
    font-size: 12px; color: var(--text-dim); text-align: right; line-height: 1.4;
  }

  main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Lookup screen ── */
  #lookup-screen {
    flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 80px);
    gap: 24px;
    padding: 40px 20px;
  }
  #lookup-screen.active { display: flex; }
  #lookup-screen h1 { font-size: 28px; font-weight: 700; text-align: center; }
  #lookup-screen p { color: var(--text-dim); text-align: center; font-size: 15px; }

  .input-row {
    display: flex; gap: 12px; width: 100%; max-width: 340px;
  }

  input[type="text"], input[type="number"] {
    flex: 1;
    height: var(--tap);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 20px;
    font-weight: 600;
    padding: 0 16px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: #555;
  }

  .btn {
    height: var(--tap);
    padding: 0 24px;
    border-radius: var(--radius);
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    -webkit-appearance: none;
  }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-ghost {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-sm {
    height: 40px; padding: 0 16px; font-size: 14px;
    border-radius: 8px;
  }
  .btn-icon {
    width: var(--tap); padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  /* ── Config panel ── */
  #config-panel {
    width: 100%; max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #config-panel h3 { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-dim); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: var(--text-dim); }
  .field input { flex: none; width: 100%; font-size: 15px; }

  /* ── Order header ── */
  #order-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  #order-header .order-num {
    font-size: 13px; color: var(--text-dim); margin-bottom: 4px;
  }
  #order-header .customer {
    font-size: 20px; font-weight: 700; margin-bottom: 10px;
  }
  .order-meta { display: flex; gap: 20px; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; }
  .meta-value { font-size: 15px; font-weight: 600; }

  /* ── Progress bar ── */
  .progress-wrap {
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .progress-bar {
    flex: 1; height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--green);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-label { font-size: 14px; font-weight: 700; white-space: nowrap; }

  /* ── Line items ── */
  .section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text-dim); text-transform: uppercase;
    margin-bottom: 10px;
  }

  #items-list { display: flex; flex-direction: column; gap: 8px; }

  .line-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .line-item:active { opacity: 0.85; }

  .line-item.complete {
    border-color: var(--green);
    background: rgba(34,197,94,0.06);
  }
  .line-item.over {
    border-color: var(--red);
    background: rgba(239,68,68,0.06);
  }
  .line-item.partial {
    border-color: var(--amber);
  }
  .line-item.scanning {
    border-color: var(--blue);
    background: rgba(59,130,246,0.06);
  }

  .item-status-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    background: var(--surface2);
  }
  .line-item.complete .item-status-icon { background: rgba(34,197,94,0.15); }
  .line-item.over .item-status-icon { background: rgba(239,68,68,0.15); }
  .line-item.partial .item-status-icon { background: rgba(245,158,11,0.15); }

  .item-info { flex: 1; min-width: 0; }
  .item-desc {
    font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-sub {
    font-size: 12px; color: var(--text-dim); margin-top: 3px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .item-sub span { white-space: nowrap; }

  .item-count {
    display: flex; flex-direction: column; align-items: flex-end;
    flex-shrink: 0;
  }
  .count-frac {
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.02em;
  }
  .count-frac.over { color: var(--red); }
  .count-frac.complete { color: var(--green); }
  .count-frac.partial { color: var(--amber); }
  .count-label { font-size: 11px; color: var(--text-dim); }

  /* Manual tap increment */
  .manual-btn {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .manual-btn:active { background: #333; }

  /* ── Scan zone ── */
  #scan-footer {
    display: flex; align-items: center; gap: 12px;
  }
  #scan-indicator {
    flex: 1;
    height: var(--tap);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; align-items: center; padding: 0 16px; gap: 10px;
    font-size: 14px; color: var(--text-dim);
    overflow: hidden;
    position: relative;
  }
  #scan-indicator .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #scan-buffer-display {
    font-family: monospace; font-size: 13px; color: var(--text-dim);
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Flash overlay ── */
  #flash {
    position: fixed; inset: 0; pointer-events: none;
    opacity: 0; transition: opacity 0.05s;
    z-index: 100;
  }
  #flash.show { opacity: 1; }
  #flash.green { background: rgba(34,197,94,0.25); }
  #flash.red { background: rgba(239,68,68,0.25); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity 0.2s;
    z-index: 200; white-space: nowrap;
    max-width: 90vw;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }
  #toast.warn { border-color: var(--amber); color: var(--amber); }

  /* ── Loading ── */
  #loading-screen {
    flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 80px);
    gap: 20px;
  }
  #loading-screen.active { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-label { color: var(--text-dim); font-size: 14px; }

  /* ── Error screen ── */
  #error-screen {
    flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 80px);
    gap: 16px; padding: 40px 20px; text-align: center;
  }
  #error-screen.active { display: flex; }
  #error-icon { font-size: 48px; }
  #error-msg { color: var(--text-dim); font-size: 15px; max-width: 340px; line-height: 1.5; }

  /* ── Complete screen ── */
  #complete-screen {
    flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 80px);
    gap: 24px; padding: 40px 20px; text-align: center;
  }
  #complete-screen.active { display: flex; }
  #complete-icon { font-size: 64px; }
  #complete-screen h2 { font-size: 28px; font-weight: 800; }
  #complete-screen p { color: var(--text-dim); font-size: 15px; max-width: 320px; line-height: 1.5; }
  .summary-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; width: 100%; max-width: 360px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .summary-card .val { font-size: 28px; font-weight: 800; }
  .summary-card .lbl { font-size: 12px; color: var(--text-dim); }
  .summary-card.green { border-color: var(--green); }
  .summary-card.red { border-color: var(--red); }
  .summary-card.amber { border-color: var(--amber); }

  /* ── Utility ── */
  .upc-chip {
    font-size: 10px; font-family: monospace;
    background: var(--surface2);
    border-radius: 4px; padding: 2px 6px;
    color: var(--text-dim); letter-spacing: 0.03em;
  }
  .no-upc { color: var(--amber); font-size: 11px; }

  /* ── Hidden scan input ── */
  #scan-input {
    position: fixed; left: -9999px; top: -9999px;
    width: 1px; height: 1px; opacity: 0;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo-wrap">
      <img src="logo.png" alt="WNDRR" class="logo-img">
      <span class="logo-sub">Warehouse Scan</span>
    </div>
    <div id="header-status"></div>
  </header>

  <main>
    <!-- LOOKUP -->
    <div id="lookup-screen" class="screen active">
      <h1>Scan to Verify</h1>
      <p>Enter an order number to begin verification</p>

      <div class="input-row">
        <input type="number" id="order-input" placeholder="Order #" inputmode="numeric"
               autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn btn-primary" onclick="App.loadOrder()">Load</button>
      </div>

    </div>

    <!-- LOADING -->
    <div id="loading-screen" class="screen">
      <div class="spinner"></div>
      <div id="loading-label">Loading order…</div>
    </div>

    <!-- ERROR -->
    <div id="error-screen" class="screen">
      <div id="error-icon">⚠️</div>
      <h2>Something went wrong</h2>
      <p id="error-msg"></p>
      <button class="btn btn-primary" onclick="App.goLookup()">Try Again</button>
    </div>

    <!-- ORDER VIEW -->
    <div id="order-screen" class="screen">
      <div id="order-header">
        <div class="order-num" id="oh-num"></div>
        <div class="customer" id="oh-customer"></div>
        <div class="order-meta">
          <div class="meta-item">
            <span class="meta-label">Date</span>
            <span class="meta-value" id="oh-date"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Total Units</span>
            <span class="meta-value" id="oh-qty"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Lines</span>
            <span class="meta-value" id="oh-lines"></span>
          </div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progress-label">0 / 0</div>
      </div>

      <div class="section-title">Line Items</div>
      <div id="items-list"></div>
    </div>

    <!-- COMPLETE -->
    <div id="complete-screen" class="screen">
      <div id="complete-icon">✅</div>
      <h2>Order Complete</h2>
      <p id="complete-subtitle"></p>
      <div class="summary-grid" id="summary-grid"></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
        <button class="btn btn-ghost" onclick="App.goOrder()">Back to Order</button>
        <button class="btn btn-primary" onclick="App.goLookup()">New Order</button>
      </div>
    </div>
  </main>

  <!-- FOOTER (scan zone) -->
  <footer id="scan-footer" style="display:none;">
    <div id="scan-indicator">
      <div class="dot"></div>
      <span>Ready to scan</span>
      <span id="scan-buffer-display"></span>
    </div>
    <button class="btn btn-ghost btn-icon" id="refresh-btn" onclick="App.refreshOrder()" title="Refresh order">↻</button>
    <button class="btn btn-ghost btn-icon" onclick="App.goLookup()" title="New order">✕</button>
  </footer>
</div>

<!-- Hidden input to capture barcode scanner (keyboard wedge) -->
<input type="text" id="scan-input" autocomplete="off" autocorrect="off"
       autocapitalize="off" spellcheck="false" readonly>

<!-- Flash overlay -->
<div id="flash"></div>
<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const Config = {
  get baseUrl() { return '/.netlify/functions/am-proxy'; },
  valid()       { return true; },
};

// ── Audio ─────────────────────────────────────────────────────────────────────
const Audio = (() => {
  let ctx = null;
  const init = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  };
  const tone = (freq, dur, type = 'sine', vol = 0.3) => {
    try {
      init();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  };
  return {
    success: () => { tone(880, 0.08); setTimeout(() => tone(1320, 0.12), 80); },
    error:   () => { tone(220, 0.3, 'sawtooth', 0.25); },
    complete:() => {
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.15), i * 100));
    },
    over:    () => { tone(330, 0.15, 'square', 0.2); setTimeout(() => tone(220, 0.2, 'square', 0.2), 120); },
  };
})();

// ── Flash / Toast ─────────────────────────────────────────────────────────────
const flashEl = document.getElementById('flash');
const toastEl  = document.getElementById('toast');
let flashTimer, toastTimer;

function flash(type) {
  clearTimeout(flashTimer);
  flashEl.className = `show ${type}`;
  flashTimer = setTimeout(() => { flashEl.className = ''; }, 200);
}

function toast(msg, type = '', dur = 2000) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.className = `show ${type}`;
  toastTimer = setTimeout(() => { toastEl.className = ''; }, dur);
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const url = `${Config.baseUrl}?path=${encodeURIComponent(path)}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status}${body ? ': ' + body.slice(0, 120) : ''}`);
  }
  return res.json();
}

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  orderId: null,
  orderData: null,       // raw AM order
  lines: [],             // enriched line items
  scanBuffer: '',
  scanTimeout: null,
};

// Each line: { index, sku_id, description, style, colour, size, qty, qty_shipped, upc, verified, hasUpc }

// ── App ───────────────────────────────────────────────────────────────────────
const App = {

  // ── Screens ──
  showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
    const showFooter = id === 'order-screen';
    document.getElementById('scan-footer').style.display = showFooter ? 'flex' : 'none';
    if (showFooter) this._focusScanInput();
  },

  goLookup() {
    state.orderId = null; state.orderData = null; state.lines = [];
    this.showScreen('lookup-screen');
    document.getElementById('header-status').textContent = '';
    document.getElementById('order-input').focus();
  },

  goOrder() {
    this.showScreen('order-screen');
    this.renderOrder();
  },

  // ── Load order ──
  async loadOrder() {
    const raw = document.getElementById('order-input').value.trim();
    if (!raw) { toast('Enter an order number', 'warn'); return; }

    state.orderId = raw;
    this.showScreen('loading-screen');
    document.getElementById('loading-label').textContent = 'Loading order…';

    try {
      const orderRes = await apiFetch(`orders/${raw}`);
      const order = orderRes.response?.[0] || orderRes;
      if (!order || !order.order_id) throw new Error('Order not found.');
      state.orderData = order;

      const items = order.order_items || [];
      if (!items.length) throw new Error('Order has no line items.');

      // Fetch inventory in parallel
      document.getElementById('loading-label').textContent =
        `Loading ${items.length} SKU${items.length !== 1 ? 's' : ''}…`;

      const invResults = await Promise.allSettled(
        items.map(i => apiFetch(`inventory/${i.sku_id}`))
      );

      state.lines = items.map((item, idx) => {
        const inv = invResults[idx];
        const invData = inv.status === 'fulfilled' ? (inv.value?.response?.[0] || inv.value) : null;
        const upc = invData ? (invData.upc_display || invData.upc || '').trim() : '';
        return {
          index: idx,
          sku_id: item.sku_id,
          description: item.description || `${item.style_number || ''} ${item.attr_2 || ''}`.trim() || 'Item',
          style: item.style_number || '',
          colour: item.attr_2 || '',
          size: item.size || '',
          qty: Number(item.qty) || 0,
          qty_shipped: Number(item.qty_shipped) || 0,
          upc: upc,
          hasUpc: !!upc,
          verified: 0,
        };
      });

      this.showScreen('order-screen');
      this.renderOrder();

      const noUpc = state.lines.filter(l => !l.hasUpc).length;
      if (noUpc > 0) {
        toast(`${noUpc} line${noUpc > 1 ? 's' : ''} have no UPC — tap to verify manually`, 'warn', 4000);
      }
    } catch(e) {
      this.showScreen('error-screen');
      document.getElementById('error-msg').textContent = e.message;
    }
  },

  async refreshOrder() {
    if (!state.orderId) return;
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true; btn.textContent = '⋯';

    try {
      const orderRes = await apiFetch(`orders/${state.orderId}`);
      const order = orderRes.response?.[0] || orderRes;
      state.orderData = order;
      const items = order.order_items || [];

      // Preserve verified counts, update qtys, re-fetch missing UPCs
      const needInv = items.filter(
        (item, idx) => !state.lines[idx]?.hasUpc
      );

      const invResults = await Promise.allSettled(
        items.map(i => apiFetch(`inventory/${i.sku_id}`))
      );

      items.forEach((item, idx) => {
        const existing = state.lines[idx];
        const inv = invResults[idx];
        const invData = inv.status === 'fulfilled' ? (inv.value?.response?.[0] || inv.value) : null;
        const upc = invData ? (invData.upc_display || invData.upc || '').trim() : (existing?.upc || '');
        if (existing) {
          existing.qty = Number(item.qty) || 0;
          existing.qty_shipped = Number(item.qty_shipped) || 0;
          existing.upc = upc;
          existing.hasUpc = !!upc;
        }
      });

      this.renderOrder();
      toast('Refreshed', 'success');
    } catch(e) {
      toast('Refresh failed: ' + e.message.slice(0, 60), 'error', 3000);
    } finally {
      btn.disabled = false; btn.textContent = '↻';
    }
  },

  // ── Render ──
  renderOrder() {
    const order = state.orderData;
    const lines = state.lines;

    // Header
    document.getElementById('oh-num').textContent = `Order #${state.orderId}`;
    document.getElementById('oh-customer').textContent =
      order.company_name || order.customer_name || order.ship_to_name || 'Customer';
    document.getElementById('oh-date').textContent =
      order.date ? new Date(order.date).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }) : '—';
    const totalQty = lines.reduce((s, l) => s + l.qty, 0);
    document.getElementById('oh-qty').textContent = totalQty;
    document.getElementById('oh-lines').textContent = lines.length;

    // Header status
    document.getElementById('header-status').innerHTML =
      `Order #${state.orderId}<br><span style="color:var(--text-dim)">` +
      `${order.company_name || order.customer_name || ''}</span>`;

    // Progress
    const totalVerified = lines.reduce((s, l) => s + Math.min(l.verified, l.qty), 0);
    const pct = totalQty > 0 ? Math.min(100, Math.round(totalVerified / totalQty * 100)) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${totalVerified} / ${totalQty}`;

    // Items
    const list = document.getElementById('items-list');
    list.innerHTML = '';

    lines.forEach(line => {
      const complete = line.verified >= line.qty && line.qty > 0;
      const over     = line.verified > line.qty;
      const partial  = line.verified > 0 && !complete;

      let cls = '';
      if (over)      cls = 'over';
      else if (complete) cls = 'complete';
      else if (partial)  cls = 'partial';

      let icon = '○';
      if (over)      icon = '⚠';
      else if (complete) icon = '✓';
      else if (partial)  icon = '◐';

      let fracCls = '';
      if (over)      fracCls = 'over';
      else if (complete) fracCls = 'complete';
      else if (partial)  fracCls = 'partial';

      const upcTag = line.hasUpc
        ? `<span class="upc-chip">${line.upc}</span>`
        : `<span class="no-upc">⚡ No UPC — tap to verify</span>`;

      const el = document.createElement('div');
      el.className = `line-item ${cls}`;
      el.dataset.idx = line.index;
      el.innerHTML = `
        <div class="item-status-icon">${icon}</div>
        <div class="item-info">
          <div class="item-desc">${this._esc(line.description)}</div>
          <div class="item-sub">
            <span>${this._esc(line.style)}</span>
            ${line.colour ? `<span>${this._esc(line.colour)}</span>` : ''}
            ${line.size   ? `<span>Sz ${this._esc(line.size)}</span>` : ''}
            ${upcTag}
          </div>
        </div>
        <div class="item-count">
          <div class="count-frac ${fracCls}">${line.verified}/${line.qty}</div>
          <div class="count-label">verified</div>
        </div>
        <button class="manual-btn" data-idx="${line.index}" title="Manually verify one unit">+</button>
      `;

      // Manual +1 button
      el.querySelector('.manual-btn').addEventListener('click', e => {
        e.stopPropagation();
        this.verifyManual(line.index);
      });

      list.appendChild(el);
    });

    this._focusScanInput();
    this._checkComplete();
  },

  // ── Verification ──
  verifyManual(idx) {
    const line = state.lines[idx];
    if (!line) return;

    if (line.verified >= line.qty) {
      Audio.over();
      flash('red');
      toast(`${line.description} — already complete!`, 'error');
      return;
    }

    line.verified++;
    Audio.success();
    flash('green');
    this.renderOrder();

    const remaining = line.qty - line.verified;
    if (remaining === 0) {
      toast(`✓ ${line.description} complete`, 'success');
    } else {
      toast(`+1 — ${remaining} to go`, 'success');
    }
  },

  verifyScan(barcode) {
    // Match against all lines with UPC
    const matches = state.lines.filter(l => l.hasUpc && l.upc === barcode);

    if (!matches.length) {
      Audio.error();
      flash('red');
      toast(`No match: ${barcode}`, 'error', 3000);
      return;
    }

    // If multiple lines share the same UPC, pick the first incomplete one
    const line = matches.find(l => l.verified < l.qty) || matches[0];

    if (line.verified >= line.qty) {
      Audio.over();
      flash('red');
      toast(`Over-scan: ${line.description}`, 'error', 2500);
      // Still mark it so the UI shows red
      line.verified++;
      this.renderOrder();
      return;
    }

    line.verified++;
    Audio.success();
    flash('green');

    const remaining = line.qty - line.verified;
    if (remaining === 0) {
      toast(`✓ ${line.description} complete`, 'success');
    } else {
      toast(`${line.description} — ${remaining} left`, 'success');
    }

    this.renderOrder();
  },

  _checkComplete() {
    const lines = state.lines;
    if (!lines.length) return;
    const allDone = lines.every(l => l.verified >= l.qty);
    if (allDone) {
      setTimeout(() => this.showComplete(), 600);
    }
  },

  showComplete() {
    Audio.complete();
    const lines = state.lines;
    const totalQty      = lines.reduce((s, l) => s + l.qty, 0);
    const totalVerified = lines.reduce((s, l) => s + l.verified, 0);
    const overLines     = lines.filter(l => l.verified > l.qty).length;
    const scanLines     = lines.filter(l => l.hasUpc).length;

    document.getElementById('complete-subtitle').textContent =
      `Order #${state.orderId} — all ${lines.length} lines verified`;

    const grid = document.getElementById('summary-grid');
    grid.innerHTML = `
      <div class="summary-card green">
        <div class="val">${totalVerified}</div>
        <div class="lbl">Units Verified</div>
      </div>
      <div class="summary-card">
        <div class="val">${lines.length}</div>
        <div class="lbl">Lines</div>
      </div>
      ${overLines ? `
      <div class="summary-card red">
        <div class="val">${overLines}</div>
        <div class="lbl">Over-scanned</div>
      </div>` : ''}
      <div class="summary-card">
        <div class="val">${scanLines}</div>
        <div class="lbl">Scanned by Barcode</div>
      </div>
    `;

    this.showScreen('complete-screen');
  },

  // ── Scan input handling ──
  _focusScanInput() {
    const inp = document.getElementById('scan-input');
    // Remove readonly briefly to allow focus, then restore
    inp.removeAttribute('readonly');
    inp.focus();
    setTimeout(() => inp.setAttribute('readonly', ''), 100);
  },

  _onScanKey(e) {
    // Ignore modifier-only combos
    if (e.key === 'Tab' || e.key === 'Escape') return;

    // Order input takes precedence if it's focused
    if (document.activeElement === document.getElementById('order-input')) {
      if (e.key === 'Enter') App.loadOrder();
      return;
    }

    const activeScreen = document.querySelector('.screen.active');
    if (!activeScreen || activeScreen.id !== 'order-screen') return;

    // Re-focus scan input
    const inp = document.getElementById('scan-input');

    if (e.key === 'Enter') {
      const buf = state.scanBuffer.trim();
      state.scanBuffer = '';
      document.getElementById('scan-buffer-display').textContent = '';
      inp.value = '';
      clearTimeout(state.scanTimeout);
      if (buf.length >= 3) App.verifyScan(buf);
      return;
    }

    if (e.key.length === 1) {
      state.scanBuffer += e.key;
      document.getElementById('scan-buffer-display').textContent = state.scanBuffer;

      clearTimeout(state.scanTimeout);
      // Auto-submit after 200 ms silence (handles scanners that don't send Enter)
      state.scanTimeout = setTimeout(() => {
        const buf = state.scanBuffer.trim();
        state.scanBuffer = '';
        document.getElementById('scan-buffer-display').textContent = '';
        inp.value = '';
        if (buf.length >= 6) App.verifyScan(buf);
      }, 200);
    }
  },

  _esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  },
};

// ── Keyboard wedge capture ────────────────────────────────────────────────────
document.addEventListener('keydown', e => App._onScanKey(e));

// Keep scan input focused when order screen is active
document.addEventListener('click', e => {
  const active = document.querySelector('.screen.active');
  if (!active || active.id !== 'order-screen') return;
  // Don't steal focus from interactive elements
  const tag = e.target.tagName;
  if (['INPUT','BUTTON','TEXTAREA','SELECT','A'].includes(tag)) return;
  App._focusScanInput();
});

// Order input: submit on Enter
document.getElementById('order-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); App.loadOrder(); }
});

// Init
App.goLookup();
</script>
</body>
